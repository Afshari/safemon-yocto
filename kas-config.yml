header:
  version: 18

machine: raspberrypi4-64
distro: safemon
target: core-image-base

repos:
  poky:
    url: https://git.yoctoproject.org/poky.git
    refspec: scarthgap
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-raspberrypi:
    url: https://github.com/agherzan/meta-raspberrypi.git
    refspec: scarthgap

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded.git
    refspec: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-networking:

  meta-safemon:
    path: .
    layers:
      meta-safemon:
