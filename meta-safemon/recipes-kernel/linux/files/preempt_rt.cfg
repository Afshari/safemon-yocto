# Enable full PREEMPT_RT
CONFIG_PREEMPT_RT=y
CONFIG_PREEMPT=y
CONFIG_PREEMPT_COUNT=y

# Disable incompatible options
CONFIG_VIRTUALIZATION=n
CONFIG_RCU_EXPERT=y
CONFIG_RCU_BOOST=y

# High resolution timers - required for RT
CONFIG_HZ_1000=y
CONFIG_HZ=1000
CONFIG_HIGH_RES_TIMERS=y

# Disable CPU frequency scaling interference
CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
